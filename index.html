<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonYuk</title>
    
    <link rel="icon" type="image/png" href="https://github.githubassets.com/favicons/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #03060e;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --shape-bg: rgba(59, 130, 246, 0.02); /* Lebih redup */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* --- EFEK BACKGROUND AMBIENT REDUP --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .aurora {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            /* Opacity diturunkan menjadi 0.12 agar tidak terlalu terang */
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(13, 148, 136, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 80% 35%, rgba(37, 99, 235, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 45% 75%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            filter: blur(30px);
            mix-blend-mode: screen;
            animation: auroraSlow 25s infinite alternate ease-in-out;
        }

        @keyframes auroraSlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(45deg) scale(1.05); }
        }

        /* --- TATA LETAK UTAMA --- */
        .content-wrapper {
            max-width: 600px;
            width: 100%;
            z-index: 1;
        }

        /* Sistem Animasi Halaman SPA */
        .page {
            display: none;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .page.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0 0 12px 0;
            color: #ffffff;
            position: relative;
            display: inline-block;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* Glitch halus disederhanakan agar tidak terlalu silau */
        h1::before, h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        h1::before {
            left: 1px;
            text-shadow: -1px 0 rgba(255, 0, 193, 0.5);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 6s infinite linear alternate-reverse;
        }

        h1::after {
            left: -1px;
            text-shadow: -1px 0 rgba(0, 255, 249, 0.5);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim2 6s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 66px, 0); }
            10% { clip: rect(34px, 9999px, 55px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 110px, 0); }
            10% { clip: rect(5px, 9999px, 40px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 35px 0 15px 5px;
            font-weight: 700;
            text-align: center;
        }

        /* --- TOMBOL MULAI --- */
        .center-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .start-btn {
            background: rgba(10, 15, 28, 0.4); 
            border: 1px solid rgba(59, 130, 246, 0.15);
            padding: 18px 40px;
            border-radius: 50px;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .start-btn:hover {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.15);
        }

        /* --- LIST SITE MENU --- */
        .site-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .site-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 15, 28, 0.3); 
            border: 1px solid var(--border-color);
            padding: 18px 22px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            position: relative;
        }

        .site-item:hover {
            background: rgba(15, 23, 42, 0.5);
            border-color: rgba(59, 130, 246, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .site-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            margin-right: 12px;
            opacity: 0.8;
        }

        .site-item::after {
            content: "→";
            font-size: 16px;
            color: var(--text-muted);
            opacity: 0.3;
            transition: all 0.3s ease;
            position: absolute;
            right: 22px;
        }

        .site-item:hover::after {
            color: var(--accent-primary);
            opacity: 0.8;
            transform: translateX(2px);
        }

        /* --- OVERLAY FADE ELEGAN TAMPAK SENYAP --- */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .fade-overlay.visible {
            opacity: 0.85; /* Meredupkan layar dengan halus, tidak langsung hitam pekat kelam */
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="aurora"></div>
    </div>

    <div id="transition-overlay" class="fade-overlay"></div>

    <div class="content-wrapper">
        <header>
            <h1 data-text="NontonYuk">NontonYuk</h1>
            <p class="subtitle">Khusus untuk jiel.</p>
        </header>

        <div id="welcome-page" class="page active">
            <div class="center-btn-wrapper">
                <button class="start-btn" onclick="triggerFadeTransition()">Mulai Nonton!</button>
            </div>
        </div>

        <div id="menu-page" class="page">
            <div class="section-title">Pilih Bioskop Favorit Kamu ❤️</div>
            <div class="site-list">
                <a class="site-item" href="https://z2.idlixku.com/">

                    LK21

        </div>
    </div>

    <script>
        function triggerFadeTransition() {
            const overlay = document.getElementById('transition-overlay');
            const welcomePage = document.getElementById('welcome-page');
            const menuPage = document.getElementById('menu-page');

            // 1. Munculkan overlay peredup hitam transparan secara lembut
            overlay.classList.add('visible');

            // 2. Di tengah redup (milidetik ke-400), ganti konten halaman diam-diam
            setTimeout(() => {
                welcomePage.classList.remove('active');
                menuPage.classList.add('active');
                
                // 3. Hilangkan kembali overlay peredup agar halaman baru memudar muncul (fade-in)
                setTimeout(() => {
                    overlay.classList.remove('visible');
                }, 50);
                
            }, 400);
        }
    </script>
</body>
</html>
